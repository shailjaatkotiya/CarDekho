version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cardekho}
      POSTGRES_USER: ${POSTGRES_USER:-cardekho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cardekho}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cardekho} -d ${POSTGRES_DB:-cardekho}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cardekho}:${POSTGRES_PASSWORD:-cardekho}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cardekho}
      REDIS_URL: redis://${REDIS_HOST:-cache}:${REDIS_PORT:-6379}/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-change-me-refresh}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
      python -m app.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cardekho}:${POSTGRES_PASSWORD:-cardekho}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cardekho}
      REDIS_URL: redis://${REDIS_HOST:-cache}:${REDIS_PORT:-6379}/0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_GRAPHQL_URL: http://localhost:8000/graphql
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173

  nginx:
    image: nginx:1.27
    depends_on:
      - frontend
      - backend
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:80"

volumes:
  postgres_data:
